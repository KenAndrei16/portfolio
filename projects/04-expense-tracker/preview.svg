<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',sans-serif">
  <rect width="800" height="450" fill="#0d1117"/>
  <!-- header -->
  <rect x="60" y="16" width="680" height="54" rx="12" fill="#161b22" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="84" y="40" font-size="18" font-weight="700" fill="#d4a843">Expense Tracker</text>
  <text x="84" y="58" font-size="10" fill="#8892a4">April 2026</text>
  <!-- summary cards -->
  <rect x="60"  y="82" width="204" height="56" rx="10" fill="#161b22" stroke="#3fb950" stroke-opacity=".25" stroke-width="1"/>
  <rect x="76"  y="96" width="30" height="30" rx="7" fill="#3fb950" fill-opacity=".12"/>
  <text x="86" y="116" font-size="14" fill="#3fb950">↑</text>
  <text x="114" y="104" font-size="9" fill="#8892a4">TOTAL INCOME</text>
  <text x="114" y="126" font-size="14" font-weight="700" fill="#3fb950">₱ 15,000.00</text>
  <rect x="278" y="82" width="204" height="56" rx="10" fill="#161b22" stroke="#f85149" stroke-opacity=".25" stroke-width="1"/>
  <rect x="294" y="96" width="30" height="30" rx="7" fill="#f85149" fill-opacity=".12"/>
  <text x="304" y="116" font-size="14" fill="#f85149">↓</text>
  <text x="332" y="104" font-size="9" fill="#8892a4">TOTAL EXPENSES</text>
  <text x="332" y="126" font-size="14" font-weight="700" fill="#f85149">₱ 8,450.00</text>
  <rect x="496" y="82" width="244" height="56" rx="10" fill="#161b22" stroke="#d4a843" stroke-opacity=".25" stroke-width="1"/>
  <rect x="512" y="96" width="30" height="30" rx="7" fill="#d4a843" fill-opacity=".12"/>
  <text x="518" y="116" font-size="14">💳</text>
  <text x="550" y="104" font-size="9" fill="#8892a4">BALANCE</text>
  <text x="550" y="126" font-size="14" font-weight="700" fill="#d4a843">₱ 6,550.00</text>
  <!-- progress bar -->
  <rect x="60" y="150" width="680" height="38" rx="10" fill="#161b22" stroke="#ffffff" stroke-opacity=".05" stroke-width="1"/>
  <text x="78" y="166" font-size="10" fill="#8892a4">Spent</text>
  <text x="720" y="166" font-size="10" fill="#8892a4" text-anchor="end">56% of income</text>
  <rect x="78" y="172" width="644" height="7" rx="3" fill="#0d1117"/>
  <rect x="78" y="172" width="360" height="7" rx="3" fill="#3fb950"/>
  <!-- add form -->
  <rect x="60" y="200" width="680" height="96" rx="12" fill="#161b22" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="80" y="222" font-size="9" font-weight="700" fill="#d4a843" letter-spacing="1">ADD TRANSACTION</text>
  <rect x="78" y="230" width="220" height="28" rx="7" fill="#0d1117" stroke="#d4a843" stroke-opacity=".18" stroke-width="1"/>
  <text x="94" y="248" font-size="11" fill="#4a5568">e.g. Lunch, Salary...</text>
  <rect x="308" y="230" width="130" height="28" rx="7" fill="#0d1117" stroke="#d4a843" stroke-opacity=".18" stroke-width="1"/>
  <text x="324" y="248" font-size="11" fill="#4a5568">0.00</text>
  <rect x="448" y="230" width="120" height="28" rx="7" fill="#0d1117" stroke="#d4a843" stroke-opacity=".18" stroke-width="1"/>
  <text x="464" y="248" font-size="11" fill="#8892a4">🍜 Food</text>
  <rect x="578" y="230" width="140" height="28" rx="7" fill="#f85149" fill-opacity=".15" stroke="#f85149" stroke-opacity=".5" stroke-width="1"/>
  <text x="648" y="248" font-size="11" fill="#f85149" text-anchor="middle">− Expense</text>
  <rect x="78" y="266" width="640" height="24" rx="7" fill="#d4a843"/>
  <text x="398" y="282" font-size="12" font-weight="700" fill="#0a0f1e" text-anchor="middle">Add Transaction</text>
  <!-- history -->
  <rect x="60" y="308" width="680" height="126" rx="12" fill="#161b22" stroke="#ffffff" stroke-opacity=".05" stroke-width="1"/>
  <text x="80" y="328" font-size="9" font-weight="700" fill="#d4a843" letter-spacing="1">HISTORY</text>
  <rect x="70" y="336" width="660" height="28" rx="8" fill="#ffffff" fill-opacity=".025" stroke="#ffffff" stroke-opacity=".04" stroke-width="1"/>
  <text x="86" y="354" font-size="14">🍜</text>
  <text x="108" y="349" font-size="11" font-weight="500" fill="#e6edf3">Jollibee lunch</text>
  <text x="108" y="361" font-size="9" fill="#4a5568">Apr 18 · food</text>
  <text x="722" y="354" font-size="12" font-weight="700" fill="#f85149" text-anchor="end">−₱220.00</text>
  <rect x="70" y="368" width="660" height="28" rx="8" fill="#ffffff" fill-opacity=".025" stroke="#ffffff" stroke-opacity=".04" stroke-width="1"/>
  <text x="86" y="386" font-size="14">💰</text>
  <text x="108" y="381" font-size="11" font-weight="500" fill="#e6edf3">Monthly allowance</text>
  <text x="108" y="393" font-size="9" fill="#4a5568">Apr 17 · salary</text>
  <text x="722" y="386" font-size="12" font-weight="700" fill="#3fb950" text-anchor="end">+₱5,000.00</text>
  <rect x="70" y="400" width="660" height="28" rx="8" fill="#ffffff" fill-opacity=".025" stroke="#ffffff" stroke-opacity=".04" stroke-width="1"/>
  <text x="86" y="418" font-size="14">🚌</text>
  <text x="108" y="413" font-size="11" font-weight="500" fill="#e6edf3">Jeepney fare</text>
  <text x="108" y="425" font-size="9" fill="#4a5568">Apr 17 · transport</text>
  <text x="722" y="418" font-size="12" font-weight="700" fill="#f85149" text-anchor="end">−₱25.00</text>
</svg>
