<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',sans-serif" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="dangerBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#f85149"/>
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="#0d1117"/>
  <!-- Header -->
  <rect x="40" y="16" width="560" height="52" rx="12" fill="#161b22" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="320" y="38" font-size="18" font-weight="700" fill="#d4a843" text-anchor="middle">Expense Tracker</text>
  <text x="320" y="56" font-size="10" fill="#8892a4" text-anchor="middle">April 2026</text>
  <!-- Summary -->
  <rect x="40"  y="80" width="172" height="48" rx="10" fill="#161b22" stroke="#3fb950" stroke-opacity=".22" stroke-width="1"/>
  <text x="126" y="100" font-size="9" fill="#8892a4" text-anchor="middle">INCOME</text>
  <text x="126" y="118" font-size="13" font-weight="700" fill="#3fb950" text-anchor="middle">₱ 15,000.00</text>
  <rect x="234" y="80" width="172" height="48" rx="10" fill="#161b22" stroke="#f85149" stroke-opacity=".22" stroke-width="1"/>
  <text x="320" y="100" font-size="9" fill="#8892a4" text-anchor="middle">EXPENSES</text>
  <text x="320" y="118" font-size="13" font-weight="700" fill="#f85149" text-anchor="middle">₱ 13,100.00</text>
  <rect x="428" y="80" width="172" height="48" rx="10" fill="#161b22" stroke="#f85149" stroke-opacity=".3" stroke-width="1"/>
  <text x="514" y="100" font-size="9" fill="#8892a4" text-anchor="middle">BALANCE</text>
  <text x="514" y="118" font-size="13" font-weight="700" fill="#f85149" text-anchor="middle">₱ 1,900.00</text>
  <!-- Progress DANGER -->
  <rect x="40" y="140" width="560" height="36" rx="10" fill="#161b22" stroke="#f85149" stroke-opacity=".2" stroke-width="1"/>
  <text x="60" y="156" font-size="10" fill="#8892a4">Spent</text>
  <text x="580" y="156" font-size="10" fill="#f85149" text-anchor="end" font-weight="600">87% of income ⚠</text>
  <rect x="60" y="162" width="520" height="6" rx="3" fill="#0d1117"/>
  <rect x="60" y="162" width="452" height="6" rx="3" fill="url(#dangerBar)"/>
  <!-- Category breakdown -->
  <rect x="40" y="188" width="560" height="268" rx="12" fill="#161b22" stroke="#ffffff" stroke-opacity=".05" stroke-width="1"/>
  <text x="320" y="212" font-size="9" font-weight="700" fill="#d4a843" letter-spacing="1" text-anchor="middle">BY CATEGORY</text>
  <!-- food -->
  <text x="60" y="238" font-size="12" fill="#8892a4">🍜 food</text>
  <rect x="160" y="228" width="320" height="8" rx="4" fill="#0d1117"/>
  <rect x="160" y="228" width="320" height="8" rx="4" fill="#d4a843"/>
  <text x="492" y="238" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="end">₱5,200</text>
  <!-- transport -->
  <text x="60" y="264" font-size="12" fill="#8892a4">🚌 transport</text>
  <rect x="160" y="254" width="320" height="8" rx="4" fill="#0d1117"/>
  <rect x="160" y="254" width="178" height="8" rx="4" fill="#d4a843"/>
  <text x="492" y="264" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="end">₱2,900</text>
  <!-- school -->
  <text x="60" y="290" font-size="12" fill="#8892a4">📚 school</text>
  <rect x="160" y="280" width="320" height="8" rx="4" fill="#0d1117"/>
  <rect x="160" y="280" width="117" height="8" rx="4" fill="#d4a843"/>
  <text x="492" y="290" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="end">₱1,900</text>
  <!-- shopping -->
  <text x="60" y="316" font-size="12" fill="#8892a4">🛍 shopping</text>
  <rect x="160" y="306" width="320" height="8" rx="4" fill="#0d1117"/>
  <rect x="160" y="306" width="74" height="8" rx="4" fill="#d4a843"/>
  <text x="492" y="316" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="end">₱1,200</text>
  <!-- health -->
  <text x="60" y="342" font-size="12" fill="#8892a4">💊 health</text>
  <rect x="160" y="332" width="320" height="8" rx="4" fill="#0d1117"/>
  <rect x="160" y="332" width="37" height="8" rx="4" fill="#d4a843"/>
  <text x="492" y="342" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="end">₱600</text>
  <!-- other -->
  <text x="60" y="368" font-size="12" fill="#8892a4">📦 other</text>
  <rect x="160" y="358" width="320" height="8" rx="4" fill="#0d1117"/>
  <rect x="160" y="358" width="19" height="8" rx="4" fill="#d4a843"/>
  <text x="492" y="368" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="end">₱300</text>
  <!-- Warning box -->
  <rect x="56" y="384" width="528" height="56" rx="10" fill="#f85149" fill-opacity=".06" stroke="#f85149" stroke-opacity=".25" stroke-width="1"/>
  <text x="320" y="408" font-size="12" fill="#f85149" text-anchor="middle" font-weight="600">⚠ You have spent 87% of your income this month.</text>
  <text x="320" y="428" font-size="11" fill="#f85149" fill-opacity=".7" text-anchor="middle">Consider reducing expenses in Food and Transport.</text>
</svg>
