<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="greenFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="60%" stop-color="#d4a843"/>
    </linearGradient>
  </defs>
  <rect width="900" height="280" fill="url(#bg3)"/>
  <ellipse cx="450" cy="50" rx="400" ry="90" fill="#d4a843" fill-opacity="0.05"/>
  <pattern id="g3" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.035"/>
  </pattern>
  <rect width="900" height="280" fill="url(#g3)"/>

