  <!-- breakdown -->
  <text x="654" y="122" font-size="9" fill="#4a5568">🍜 food</text>
  <rect x="700" y="114" width="96" height="5" rx="2.5" fill="#0d1117"/>
  <rect x="700" y="114" width="96" height="5" rx="2.5" fill="#d4a843"/>
  <text x="804" y="120" font-size="9" fill="#e6edf3" text-anchor="end">₱3,200</text>

  <text x="654" y="140" font-size="9" fill="#4a5568">🚌 transport</text>
  <rect x="700" y="132" width="96" height="5" rx="2.5" fill="#0d1117"/>
  <rect x="700" y="132" width="54" height="5" rx="2.5" fill="#d4a843"/>
  <text x="804" y="138" font-size="9" fill="#e6edf3" text-anchor="end">₱1,800</text>

  <text x="654" y="158" font-size="9" fill="#4a5568">📚 school</text>
  <rect x="700" y="150" width="96" height="5" rx="2.5" fill="#0d1117"/>
  <rect x="700" y="150" width="34" height="5" rx="2.5" fill="#d4a843"/>
