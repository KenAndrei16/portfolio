  <text x="654" y="176" font-size="9" fill="#4a5568">🛍 shopping</text>
  <rect x="700" y="168" width="96" height="5" rx="2.5" fill="#0d1117"/>
  <rect x="700" y="168" width="20" height="5" rx="2.5" fill="#d4a843"/>
  <text x="804" y="174" font-size="9" fill="#e6edf3" text-anchor="end">₱640</text>

  <text x="654" y="194" font-size="9" fill="#4a5568">💊 health</text>
  <rect x="700" y="186" width="96" height="5" rx="2.5" fill="#0d1117"/>
  <rect x="700" y="186" width="12" height="5" rx="2.5" fill="#d4a843"/>
  <text x="804" y="192" font-size="9" fill="#e6edf3" text-anchor="end">₱310</text>

  <rect x="0" y="268" width="900" height="12" fill="#d4a843" fill-opacity="0.05"/>
