  <text x="450" y="104" font-size="12" font-weight="600" fill="#d4a843" text-anchor="middle" letter-spacing="3">PROJECT 03</text>
  <text x="450" y="148" font-size="40" font-weight="900" fill="#e6edf3" text-anchor="middle" letter-spacing="-1">Expense Tracker</text>
  <text x="450" y="178" font-size="14" fill="#8892a4" text-anchor="middle">Income &amp; Expenses · Categories · Progress Bar · CRUD</text>
  <!-- tags -->
  <rect x="334" y="196" width="68" height="22" rx="11" fill="#d4a843" fill-opacity="0.12" stroke="#d4a843" stroke-width="1" stroke-opacity="0.3"/>
  <text x="368" y="211" font-size="11" fill="#d4a843" text-anchor="middle">HTML5</text>
  <rect x="410" y="196" width="52" height="22" rx="11" fill="#d4a843" fill-opacity="0.12" stroke="#d4a843" stroke-width="1" stroke-opacity="0.3"/>
  <text x="436" y="211" font-size="11" fill="#d4a843" text-anchor="middle">CSS3</text>
  <rect x="470" y="196" width="86" height="22" rx="11" fill="#d4a843" fill-opacity="0.12" stroke="#d4a843" stroke-width="1" stroke-opacity="0.3"/>
  <text x="513" y="211" font-size="11" fill="#d4a843" text-anchor="middle">JavaScript</text>

