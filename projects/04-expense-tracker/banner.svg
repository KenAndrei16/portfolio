<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',sans-serif" preserveAspectRatio="xMidYMid meet">
  <!-- Background -->
  <rect width="900" height="260" fill="#0a0f1e"/>
  <!-- Glow -->
  <ellipse cx="450" cy="0" rx="400" ry="140" fill="#d4a843" fill-opacity="0.07"/>
  <!-- Grid -->
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
  </pattern>
  <rect width="900" height="260" fill="url(#g)"/>

  <!-- Finance emoji centered -->
  <text x="450" y="56" font-size="32" text-anchor="middle">💳</text>

  <!-- PROJECT LABEL -->
  <text x="450" y="84" font-size="11" font-weight="600" fill="#d4a843" text-anchor="middle" letter-spacing="5">PROJECT  03</text>

  <!-- TITLE -->
  <text x="450" y="136" font-size="52" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-1">Expense Tracker</text>

  <!-- SUBTITLE -->
  <text x="450" y="167" font-size="14" fill="#8892a4" text-anchor="middle">Income &amp; Expenses · Categories · Progress Bar · CRUD</text>

  <!-- TAGS - total width: 60+8+50+8+84+8+90 = 308, start at 450-308/2 = 296 -->
  <rect x="296" y="183" width="60"  height="22" rx="11" fill="#d4a843" fill-opacity=".12" stroke="#d4a843" stroke-opacity=".35" stroke-width="1"/>
  <text x="326"  y="198" font-size="11" fill="#d4a843" text-anchor="middle">HTML5</text>

  <rect x="364" y="183" width="50"  height="22" rx="11" fill="#d4a843" fill-opacity=".12" stroke="#d4a843" stroke-opacity=".35" stroke-width="1"/>
  <text x="389"  y="198" font-size="11" fill="#d4a843" text-anchor="middle">CSS3</text>

  <rect x="422" y="183" width="86"  height="22" rx="11" fill="#d4a843" fill-opacity=".12" stroke="#d4a843" stroke-opacity=".35" stroke-width="1"/>
  <text x="465"  y="198" font-size="11" fill="#d4a843" text-anchor="middle">JavaScript</text>

  <rect x="516" y="183" width="90"  height="22" rx="11" fill="#d4a843" fill-opacity=".12" stroke="#d4a843" stroke-opacity=".35" stroke-width="1"/>
  <text x="561"  y="198" font-size="11" fill="#d4a843" text-anchor="middle">localStorage</text>

  <!-- Bottom gold line -->
  <rect x="0" y="252" width="900" height="8" fill="#d4a843" fill-opacity="0.08"/>
</svg>
