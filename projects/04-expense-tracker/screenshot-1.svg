<svg viewBox="0 0 640 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',sans-serif" preserveAspectRatio="xMidYMid meet">
  <rect width="640" height="500" fill="#0d1117"/>
  <!-- Header -->
  <rect x="40" y="16" width="560" height="52" rx="12" fill="#161b22" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="320" y="38" font-size="18" font-weight="700" fill="#d4a843" text-anchor="middle">Expense Tracker</text>
  <text x="320" y="56" font-size="10" fill="#8892a4" text-anchor="middle">April 2026</text>
  <!-- Summary cards - 3 equal columns -->
  <rect x="40"  y="80" width="172" height="54" rx="10" fill="#161b22" stroke="#3fb950" stroke-opacity=".25" stroke-width="1"/>
  <rect x="56"  y="94" width="28" height="28" rx="7" fill="#3fb950" fill-opacity=".12"/>
  <text x="66"  y="113" font-size="14" fill="#3fb950">↑</text>
  <text x="92"  y="101" font-size="9" fill="#8892a4">TOTAL INCOME</text>
  <text x="92"  y="121" font-size="13" font-weight="700" fill="#3fb950">₱ 15,000.00</text>
  <rect x="234" y="80" width="172" height="54" rx="10" fill="#161b22" stroke="#f85149" stroke-opacity=".25" stroke-width="1"/>
  <rect x="250" y="94" width="28" height="28" rx="7" fill="#f85149" fill-opacity=".12"/>
  <text x="260" y="113" font-size="14" fill="#f85149">↓</text>
  <text x="286" y="101" font-size="9" fill="#8892a4">TOTAL EXPENSES</text>
  <text x="286" y="121" font-size="13" font-weight="700" fill="#f85149">₱ 8,450.00</text>
  <rect x="428" y="80" width="172" height="54" rx="10" fill="#161b22" stroke="#d4a843" stroke-opacity=".25" stroke-width="1"/>
  <rect x="444" y="94" width="28" height="28" rx="7" fill="#d4a843" fill-opacity=".12"/>
  <text x="452" y="113" font-size="14">💳</text>
  <text x="480" y="101" font-size="9" fill="#8892a4">BALANCE</text>
  <text x="480" y="121" font-size="13" font-weight="700" fill="#d4a843">₱ 6,550.00</text>
  <!-- Progress bar -->
  <rect x="40" y="146" width="560" height="36" rx="10" fill="#161b22" stroke="#ffffff" stroke-opacity=".05" stroke-width="1"/>
  <text x="60" y="162" font-size="10" fill="#8892a4">Spent</text>
  <text x="580" y="162" font-size="10" fill="#8892a4" text-anchor="end">56% of income</text>
  <rect x="60" y="168" width="520" height="6" rx="3" fill="#0d1117"/>
  <rect x="60" y="168" width="291" height="6" rx="3" fill="#3fb950"/>
  <!-- Add form - user typing -->
  <rect x="40" y="194" width="560" height="94" rx="12" fill="#161b22" stroke="#d4a843" stroke-opacity=".22" stroke-width="1.5"/>
  <text x="60" y="216" font-size="9" font-weight="700" fill="#d4a843" letter-spacing="1">ADD TRANSACTION</text>
  <rect x="58" y="224" width="210" height="28" rx="7" fill="#0d1117" stroke="#d4a843" stroke-width="1.5"/>
  <text x="72" y="242" font-size="11" fill="#e6edf3">Jollibee lunch|</text>
  <rect x="276" y="224" width="116" height="28" rx="7" fill="#0d1117" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="290" y="242" font-size="11" fill="#e6edf3">220.00</text>
  <rect x="400" y="224" width="100" height="28" rx="7" fill="#0d1117" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="414" y="242" font-size="11" fill="#8892a4">🍜 Food</text>
  <rect x="508" y="224" width="76" height="28" rx="7" fill="#f85149" fill-opacity=".15" stroke="#f85149" stroke-opacity=".5" stroke-width="1"/>
  <text x="546" y="242" font-size="10" fill="#f85149" text-anchor="middle">− Expense</text>
  <rect x="58" y="260" width="526" height="22" rx="7" fill="#d4a843"/>
  <text x="321" y="275" font-size="12" font-weight="700" fill="#0a0f1e" text-anchor="middle">Add Transaction</text>
  <!-- History -->
  <rect x="40" y="300" width="560" height="180" rx="12" fill="#161b22" stroke="#ffffff" stroke-opacity=".05" stroke-width="1"/>
  <text x="60" y="322" font-size="9" font-weight="700" fill="#d4a843" letter-spacing="1">HISTORY</text>
  <rect x="52" y="330" width="536" height="30" rx="8" fill="#ffffff" fill-opacity=".025" stroke="#ffffff" stroke-opacity=".04" stroke-width="1"/>
  <text x="70" y="349" font-size="14">🍜</text>
  <text x="92" y="344" font-size="11" font-weight="500" fill="#e6edf3">Jollibee lunch</text>
  <text x="92" y="356" font-size="9" fill="#4a5568">Apr 18 · food</text>
  <text x="580" y="349" font-size="12" font-weight="700" fill="#f85149" text-anchor="end">−₱220.00</text>
  <rect x="52" y="364" width="536" height="30" rx="8" fill="#ffffff" fill-opacity=".025" stroke="#ffffff" stroke-opacity=".04" stroke-width="1"/>
  <text x="70" y="383" font-size="14">💰</text>
  <text x="92" y="378" font-size="11" font-weight="500" fill="#e6edf3">Monthly allowance</text>
  <text x="92" y="390" font-size="9" fill="#4a5568">Apr 17 · salary</text>
  <text x="580" y="383" font-size="12" font-weight="700" fill="#3fb950" text-anchor="end">+₱5,000.00</text>
  <rect x="52" y="398" width="536" height="30" rx="8" fill="#ffffff" fill-opacity=".025" stroke="#ffffff" stroke-opacity=".04" stroke-width="1"/>
  <text x="70" y="417" font-size="14">🚌</text>
  <text x="92" y="412" font-size="11" font-weight="500" fill="#e6edf3">Jeepney fare</text>
  <text x="92" y="424" font-size="9" fill="#4a5568">Apr 17 · transport</text>
  <text x="580" y="417" font-size="12" font-weight="700" fill="#f85149" text-anchor="end">−₱25.00</text>
  <rect x="52" y="432" width="536" height="30" rx="8" fill="#ffffff" fill-opacity=".025" stroke="#ffffff" stroke-opacity=".04" stroke-width="1"/>
  <text x="70" y="451" font-size="14">📚</text>
  <text x="92" y="446" font-size="11" font-weight="500" fill="#e6edf3">Photocopy notes</text>
  <text x="92" y="458" font-size="9" fill="#4a5568">Apr 16 · school</text>
  <text x="580" y="451" font-size="12" font-weight="700" fill="#f85149" text-anchor="end">−₱80.00</text>
