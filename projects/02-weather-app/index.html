<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App — Ken Andrei</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- ── SEARCH BAR ── -->
    <div class="search-bar">
      <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="text"
        id="cityInput"
        class="search-input"
        placeholder="Search city..."
        autocomplete="off"
      />
      <button class="search-btn" onclick="searchCity()" id="searchBtn">Search</button>
    </div>

    <!-- ── QUICK CITY BUTTONS ── -->
    <div class="quick-cities">
      <button class="city-chip" onclick="loadCity('Baguio')">Baguio</button>
      <button class="city-chip" onclick="loadCity('Manila')">Manila</button>
      <button class="city-chip" onclick="loadCity('Cebu')">Cebu</button>
      <button class="city-chip" onclick="loadCity('Davao')">Davao</button>
      <button class="city-chip" onclick="loadCity('Tokyo')">Tokyo</button>
    </div>

    <!-- ── MAIN WEATHER CARD ── -->
    <div class="weather-card" id="weatherCard">

      <div class="card-top">
        <div class="location-info">
          <h2 class="city-name" id="cityName">Baguio City</h2>
          <p class="country"    id="countryName">Philippines 🇵🇭</p>
          <p class="local-time" id="localTime"></p>
        </div>
        <div class="weather-icon-wrap">
          <div class="weather-icon" id="weatherIcon">⛅</div>
          <p class="weather-desc" id="weatherDesc">Partly Cloudy</p>
        </div>
      </div>

      <div class="temp-display">
        <span class="temp-main" id="tempMain">18</span>
        <div class="temp-unit-toggle">
          <button class="unit-btn active" id="btnC" onclick="setUnit('C')">°C</button>
          <button class="unit-btn"        id="btnF" onclick="setUnit('F')">°F</button>
        </div>
      </div>

      <!-- ── DETAIL GRID ── -->
      <div class="detail-grid">
        <div class="detail-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a4 4 0 0 1 4 4c0 4-4 8-4 8S8 10 8 6a4 4 0 0 1 4-4z"/><circle cx="12" cy="6" r="1.5" fill="currentColor"/></svg>
          <span class="detail-label">Humidity</span>
          <span class="detail-value" id="humidity">78%</span>
        </div>
        <div class="detail-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
          <span class="detail-label">Wind</span>
          <span class="detail-value" id="windSpeed">12 km/h</span>
        </div>
        <div class="detail-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          <span class="detail-label">UV Index</span>
          <span class="detail-value" id="uvIndex">3 Moderate</span>
        </div>
        <div class="detail-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 12h20M12 2l8 10-8 10-8-10z"/></svg>
          <span class="detail-label">Pressure</span>
          <span class="detail-value" id="pressure">1013 hPa</span>
        </div>
        <div class="detail-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3v1M12 20v1M4.22 4.22l.707.707M18.36 18.36l.707.707M1 12h2M21 12h2M4.22 19.78l.707-.707M18.36 5.64l.707-.707"/><circle cx="12" cy="12" r="4"/></svg>
          <span class="detail-label">Sunrise</span>
          <span class="detail-value" id="sunrise">5:48 AM</span>
        </div>
        <div class="detail-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3v1M12 20v1M17.66 5.64l-.707.707M6.04 18.36l-.707.707M21 12h-2M3 12H1M17.66 18.36l-.707-.707M6.04 5.64l-.707-.707"/><circle cx="12" cy="12" r="4"/></svg>
          <span class="detail-label">Sunset</span>
          <span class="detail-value" id="sunset">6:12 PM</span>
        </div>
      </div>

      <!-- ── 5-DAY FORECAST ── -->
      <div class="forecast-section">
        <h3 class="forecast-title">5-Day Forecast</h3>
        <div class="forecast-row" id="forecastRow"></div>
      </div>

    </div>

    <!-- ── DATA DISCLAIMER ── -->
    <p class="disclaimer">
      * Weather data is simulated for demo purposes.
        In production, connect to <a href="https://openweathermap.org/api" target="_blank">OpenWeatherMap API</a>.
    </p>

  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
