<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',sans-serif">
  <rect width="800" height="450" fill="#0d1117"/>
  <rect x="100" y="20" width="600" height="410" rx="18" fill="#161b22" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <!-- search -->
  <rect x="120" y="36" width="380" height="34" rx="9" fill="#0d1117" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="140" y="57" font-size="12" fill="#4a5568">Search city...</text>
  <rect x="512" y="36" width="88" height="34" rx="9" fill="#d4a843"/>
  <text x="556" y="57" font-size="12" font-weight="700" fill="#0a0f1e" text-anchor="middle">Search</text>
  <!-- chips -->
  <rect x="120" y="80" width="56" height="20" rx="10" fill="#d4a843" fill-opacity=".2" stroke="#d4a843" stroke-opacity=".5" stroke-width="1"/>
  <text x="148" y="94" font-size="10" fill="#d4a843" text-anchor="middle">Baguio</text>
  <rect x="184" y="80" width="50" height="20" rx="10" fill="#d4a843" fill-opacity=".06" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="209" y="94" font-size="10" fill="#d4a843" text-anchor="middle">Manila</text>
  <rect x="242" y="80" width="42" height="20" rx="10" fill="#d4a843" fill-opacity=".06" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="263" y="94" font-size="10" fill="#d4a843" text-anchor="middle">Cebu</text>
  <rect x="292" y="80" width="46" height="20" rx="10" fill="#d4a843" fill-opacity=".06" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="315" y="94" font-size="10" fill="#d4a843" text-anchor="middle">Davao</text>
  <rect x="346" y="80" width="44" height="20" rx="10" fill="#d4a843" fill-opacity=".06" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="368" y="94" font-size="10" fill="#d4a843" text-anchor="middle">Tokyo</text>
  <!-- city info -->
  <text x="126" y="138" font-size="22" font-weight="700" fill="#e6edf3">Baguio City</text>
  <text x="126" y="158" font-size="13" fill="#8892a4">Philippines  ·  10:42 AM</text>
  <!-- weather icon -->
  <text x="630" y="158" font-size="58" text-anchor="middle">⛅</text>
  <text x="630" y="180" font-size="11" fill="#8892a4" text-anchor="middle">Partly Cloudy</text>
  <!-- temp -->
  <text x="126" y="228" font-size="76" font-weight="900" fill="#d4a843" letter-spacing="-2">18</text>
  <rect x="206" y="184" width="28" height="22" rx="5" fill="#d4a843" fill-opacity=".18" stroke="#d4a843" stroke-width="1"/>
  <text x="220" y="199" font-size="12" font-weight="700" fill="#d4a843" text-anchor="middle">°C</text>
  <rect x="206" y="210" width="28" height="22" rx="5" fill="none" stroke="#d4a843" stroke-opacity=".25" stroke-width="1"/>
  <text x="220" y="225" font-size="12" fill="#8892a4" text-anchor="middle">°F</text>
  <!-- detail grid -->
  <rect x="100" y="244" width="600" height="1" fill="#ffffff" fill-opacity=".06"/>
  <text x="180" y="264" font-size="9" fill="#4a5568" text-anchor="middle">HUMIDITY</text>
  <text x="180" y="280" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">78%</text>
  <line x1="260" y1="247" x2="260" y2="286" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="340" y="264" font-size="9" fill="#4a5568" text-anchor="middle">WIND</text>
  <text x="340" y="280" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">12 km/h</text>
  <line x1="420" y1="247" x2="420" y2="286" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="500" y="264" font-size="9" fill="#4a5568" text-anchor="middle">UV INDEX</text>
  <text x="500" y="280" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">3 Moderate</text>
  <line x1="580" y1="247" x2="580" y2="286" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="640" y="264" font-size="9" fill="#4a5568" text-anchor="middle">PRESSURE</text>
  <text x="640" y="280" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">1013 hPa</text>
  <!-- forecast -->
  <rect x="100" y="286" width="600" height="1" fill="#ffffff" fill-opacity=".06"/>
  <text x="126" y="308" font-size="9" font-weight="700" fill="#d4a843" letter-spacing="1">5-DAY FORECAST</text>
  <rect x="110" y="316" width="96" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="158" y="331" font-size="9" fill="#8892a4" text-anchor="middle">MON</text>
  <text x="154" y="350" font-size="18">🌤</text><text x="158" y="356" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 19°</text>
  <rect x="216" y="316" width="96" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="264" y="331" font-size="9" fill="#8892a4" text-anchor="middle">TUE</text>
  <text x="260" y="350" font-size="18">🌧</text><text x="264" y="356" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 16°</text>
  <rect x="322" y="316" width="96" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="370" y="331" font-size="9" fill="#8892a4" text-anchor="middle">WED</text>
  <text x="366" y="350" font-size="18">⛈</text><text x="370" y="356" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 15°</text>
  <rect x="428" y="316" width="96" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="476" y="331" font-size="9" fill="#8892a4" text-anchor="middle">THU</text>
  <text x="472" y="350" font-size="18">🌥</text><text x="476" y="356" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 17°</text>
  <rect x="534" y="316" width="96" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="582" y="331" font-size="9" fill="#8892a4" text-anchor="middle">FRI</text>
  <text x="578" y="350" font-size="18">☀️</text><text x="582" y="356" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 20°</text>
  <text x="400" y="420" font-size="10" fill="#4a5568" text-anchor="middle">* Weather data is simulated for demo purposes</text>
</svg>
