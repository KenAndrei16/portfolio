<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="skyBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="280" fill="url(#skyBg)"/>
  <rect width="900" height="280" fill="url(#sunGlow)"/>
  <!-- grid -->
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.035"/>
  </pattern>
  <rect width="900" height="280" fill="url(#g)"/>

  <!-- Left: city chips + card snippet -->
  <rect x="42" y="55" width="220" height="175" rx="14" fill="#161b22" stroke="#d4a843" stroke-width="1" stroke-opacity="0.18"/>
  <rect x="56" y="68" width="96" height="28" rx="8" fill="#0d1117" stroke="#d4a843" stroke-width="1" stroke-opacity="0.25"/>
  <text x="73" y="86" font-size="11" fill="#4a5568">Search city...</text>
  <!-- chips -->
  <rect x="56" y="104" width="52" height="18" rx="9" fill="#d4a843" fill-opacity="0.2" stroke="#d4a843" stroke-width="1" stroke-opacity="0.5"/>
  <text x="82" y="117" font-size="10" fill="#d4a843" text-anchor="middle">Baguio</text>
  <rect x="114" y="104" width="46" height="18" rx="9" fill="#d4a843" fill-opacity="0.06" stroke="#d4a843" stroke-width="1" stroke-opacity="0.2"/>
  <text x="137" y="117" font-size="10" fill="#d4a843" text-anchor="middle">Manila</text>
  <rect x="166" y="104" width="38" height="18" rx="9" fill="#d4a843" fill-opacity="0.06" stroke="#d4a843" stroke-width="1" stroke-opacity="0.2"/>
  <text x="185" y="117" font-size="10" fill="#d4a843" text-anchor="middle">Cebu</text>
  <!-- temp display -->
  <text x="56" y="158" font-size="44" font-weight="900" fill="#d4a843" letter-spacing="-2">18°</text>
  <text x="56" y="178" font-size="11" fill="#8892a4">Baguio City · ⛅ Partly Cloudy</text>
  <text x="56" y="196" font-size="10" fill="#4a5568">Humidity 78% · Wind 12 km/h</text>
  <text x="56" y="212" font-size="10" fill="#4a5568">UV 3 Moderate · Pressure 1013 hPa</text>

  <!-- Center text -->
  <text x="450" y="106" font-size="12" font-weight="600" fill="#d4a843" text-anchor="middle" letter-spacing="3">PROJECT 02</text>
  <text x="450" y="150" font-size="40" font-weight="900" fill="#e6edf3" text-anchor="middle" letter-spacing="-1">Weather App UI</text>
  <text x="450" y="180" font-size="14" fill="#8892a4" text-anchor="middle">Mock API · Forecast · °C/°F Toggle · Live Clock</text>
  <!-- tags -->
  <rect x="340" y="198" width="68" height="22" rx="11" fill="#d4a843" fill-opacity="0.12" stroke="#d4a843" stroke-width="1" stroke-opacity="0.3"/>
  <text x="374" y="213" font-size="11" fill="#d4a843" text-anchor="middle">HTML5</text>
  <rect x="416" y="198" width="52" height="22" rx="11" fill="#d4a843" fill-opacity="0.12" stroke="#d4a843" stroke-width="1" stroke-opacity="0.3"/>
  <text x="442" y="213" font-size="11" fill="#d4a843" text-anchor="middle">CSS3</text>
  <rect x="476" y="198" width="72" height="22" rx="11" fill="#d4a843" fill-opacity="0.12" stroke="#d4a843" stroke-width="1" stroke-opacity="0.3"/>
  <text x="512" y="213" font-size="11" fill="#d4a843" text-anchor="middle">Mock API</text>

  <!-- Right: forecast mini -->
  <rect x="638" y="55" width="224" height="175" rx="14" fill="#161b22" stroke="#d4a843" stroke-width="1" stroke-opacity="0.15"/>
  <text x="750" y="80" font-size="9" fill="#d4a843" text-anchor="middle" letter-spacing="1">5-DAY FORECAST</text>
  <!-- 5 day pills -->
  <rect x="648" y="88" width="40" height="50" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="668" y="103" font-size="9" fill="#8892a4" text-anchor="middle">MON</text>
  <text x="664" y="120" font-size="18">🌤</text>
  <text x="668" y="134" font-size="10" font-weight="700" fill="#e6edf3" text-anchor="middle">19°</text>

  <rect x="694" y="88" width="40" height="50" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="714" y="103" font-size="9" fill="#8892a4" text-anchor="middle">TUE</text>
  <text x="710" y="120" font-size="18">🌧</text>
  <text x="714" y="134" font-size="10" font-weight="700" fill="#e6edf3" text-anchor="middle">16°</text>

  <rect x="740" y="88" width="40" height="50" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="760" y="103" font-size="9" fill="#8892a4" text-anchor="middle">WED</text>
  <text x="756" y="120" font-size="18">⛈</text>
  <text x="760" y="134" font-size="10" font-weight="700" fill="#e6edf3" text-anchor="middle">15°</text>

  <rect x="786" y="88" width="40" height="50" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="806" y="103" font-size="9" fill="#8892a4" text-anchor="middle">THU</text>
  <text x="802" y="120" font-size="18">🌥</text>
  <text x="806" y="134" font-size="10" font-weight="700" fill="#e6edf3" text-anchor="middle">17°</text>

  <rect x="832" y="88" width="22" height="50" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="843" y="103" font-size="7" fill="#8892a4" text-anchor="middle">FRI</text>
  <text x="838" y="118" font-size="16">☀️</text>
  <text x="843" y="132" font-size="9" font-weight="700" fill="#e6edf3" text-anchor="middle">20°</text>

  <!-- detail row in banner card -->
  <rect x="648" y="148" width="204" height="1" fill="#ffffff" fill-opacity="0.06"/>
  <text x="668" y="165" font-size="9" fill="#4a5568" text-anchor="middle">HUMIDITY</text>
  <text x="668" y="179" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">78%</text>
  <text x="734" y="165" font-size="9" fill="#4a5568" text-anchor="middle">WIND</text>
  <text x="734" y="179" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">12km/h</text>
  <text x="806" y="165" font-size="9" fill="#4a5568" text-anchor="middle">PRESSURE</text>
  <text x="806" y="179" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">1013hPa</text>

  <rect x="0" y="268" width="900" height="12" fill="#d4a843" fill-opacity="0.05"/>
</svg>
