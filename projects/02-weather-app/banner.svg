<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',sans-serif" preserveAspectRatio="xMidYMid meet">
  <!-- Background -->
  <rect width="900" height="260" fill="#0a0f1e"/>
  <!-- Blue-tinted glow for weather feel -->
  <ellipse cx="450" cy="0" rx="400" ry="140" fill="#d4a843" fill-opacity="0.07"/>
  <!-- Grid -->
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
  </pattern>
  <rect width="900" height="260" fill="url(#g)"/>

  <!-- Weather emoji centered -->
  <text x="450" y="56" font-size="32" text-anchor="middle">⛅</text>

  <!-- PROJECT LABEL -->
  <text x="450" y="84" font-size="11" font-weight="600" fill="#d4a843" text-anchor="middle" letter-spacing="5">PROJECT  02</text>

  <!-- TITLE -->
  <text x="450" y="136" font-size="52" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-1">Weather App UI</text>

  <!-- SUBTITLE -->
  <text x="450" y="167" font-size="14" fill="#8892a4" text-anchor="middle">Mock API · 5-Day Forecast · °C/°F Toggle · Live Clock</text>

  <!-- TAGS - total width: 60+8+50+8+84+8+76 = 294, start at 450-294/2 = 303 -->
  <rect x="303" y="183" width="60"  height="22" rx="11" fill="#d4a843" fill-opacity=".12" stroke="#d4a843" stroke-opacity=".35" stroke-width="1"/>
  <text x="333"  y="198" font-size="11" fill="#d4a843" text-anchor="middle">HTML5</text>

  <rect x="371" y="183" width="50"  height="22" rx="11" fill="#d4a843" fill-opacity=".12" stroke="#d4a843" stroke-opacity=".35" stroke-width="1"/>
  <text x="396"  y="198" font-size="11" fill="#d4a843" text-anchor="middle">CSS3</text>

  <rect x="429" y="183" width="86"  height="22" rx="11" fill="#d4a843" fill-opacity=".12" stroke="#d4a843" stroke-opacity=".35" stroke-width="1"/>
  <text x="472"  y="198" font-size="11" fill="#d4a843" text-anchor="middle">JavaScript</text>

  <rect x="523" y="183" width="76"  height="22" rx="11" fill="#d4a843" fill-opacity=".12" stroke="#d4a843" stroke-opacity=".35" stroke-width="1"/>
  <text x="561"  y="198" font-size="11" fill="#d4a843" text-anchor="middle">Mock API</text>

  <!-- Bottom gold line -->
  <rect x="0" y="252" width="900" height="8" fill="#d4a843" fill-opacity="0.08"/>
</svg>
