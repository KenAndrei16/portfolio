  <rect x="224" y="60" width="40" height="20" rx="10" fill="#d4a843" fill-opacity="0.06" stroke="#d4a843" stroke-width="1" stroke-opacity="0.2"/>
  <text x="244" y="74" font-size="10" fill="#d4a843" text-anchor="middle">Tokyo</text>

