<svg viewBox="0 0 600 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',sans-serif" preserveAspectRatio="xMidYMid meet">
  <rect width="600" height="560" fill="#0d1117"/>
  <!-- Search bar -->
  <rect x="40" y="16" width="520" height="36" rx="10" fill="#161b22" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <circle cx="62" cy="34" r="5" fill="none" stroke="#8892a4" stroke-width="1.5"/>
  <line x1="66" y1="38" x2="70" y2="42" stroke="#8892a4" stroke-width="1.5"/>
  <text x="78" y="38" font-size="12" fill="#4a5568">Search city...</text>
  <rect x="462" y="22" width="88" height="24" rx="7" fill="#d4a843"/>
  <text x="506" y="38" font-size="12" font-weight="700" fill="#0a0f1e" text-anchor="middle">Search</text>
  <!-- Quick city chips -->
  <rect x="40"  y="60" width="60" height="20" rx="10" fill="#d4a843" fill-opacity=".2" stroke="#d4a843" stroke-opacity=".5" stroke-width="1"/>
  <text x="70"  y="74" font-size="10" fill="#d4a843" text-anchor="middle">Baguio</text>
  <rect x="108" y="60" width="52" height="20" rx="10" fill="#d4a843" fill-opacity=".06" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="134" y="74" font-size="10" fill="#d4a843" text-anchor="middle">Manila</text>
  <rect x="168" y="60" width="44" height="20" rx="10" fill="#d4a843" fill-opacity=".06" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="190" y="74" font-size="10" fill="#d4a843" text-anchor="middle">Cebu</text>
  <rect x="220" y="60" width="48" height="20" rx="10" fill="#d4a843" fill-opacity=".06" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="244" y="74" font-size="10" fill="#d4a843" text-anchor="middle">Davao</text>
  <rect x="276" y="60" width="44" height="20" rx="10" fill="#d4a843" fill-opacity=".06" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="298" y="74" font-size="10" fill="#d4a843" text-anchor="middle">Tokyo</text>
  <!-- Main card -->
  <rect x="40" y="88" width="520" height="452" rx="18" fill="#161b22" stroke="#d4a843" stroke-opacity=".18" stroke-width="1"/>
  <!-- City + country -->
  <text x="68" y="130" font-size="22" font-weight="700" fill="#e6edf3">Baguio City</text>
  <text x="68" y="152" font-size="13" fill="#8892a4">Philippines  ·  10:42 AM</text>
  <!-- Weather -->
  <text x="520" y="148" font-size="58" text-anchor="middle">⛅</text>
  <text x="520" y="170" font-size="11" fill="#8892a4" text-anchor="middle">Partly Cloudy</text>
  <!-- Temp -->
  <text x="68" y="228" font-size="76" font-weight="900" fill="#d4a843" letter-spacing="-2">18</text>
  <rect x="152" y="186" width="30" height="22" rx="5" fill="#d4a843" fill-opacity=".18" stroke="#d4a843" stroke-width="1"/>
  <text x="167" y="201" font-size="12" font-weight="700" fill="#d4a843" text-anchor="middle">°C</text>
  <rect x="152" y="212" width="30" height="22" rx="5" fill="none" stroke="#d4a843" stroke-opacity=".25" stroke-width="1"/>
  <text x="167" y="227" font-size="12" fill="#8892a4" text-anchor="middle">°F</text>
  <!-- Detail grid -->
  <rect x="40" y="244" width="520" height="1" fill="#ffffff" fill-opacity=".06"/>
  <text x="130" y="264" font-size="9" fill="#4a5568" text-anchor="middle">HUMIDITY</text>
  <text x="130" y="280" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">78%</text>
  <line x1="220" y1="247" x2="220" y2="288" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="300" y="264" font-size="9" fill="#4a5568" text-anchor="middle">WIND</text>
  <text x="300" y="280" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">12 km/h</text>
  <line x1="380" y1="247" x2="380" y2="288" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="460" y="264" font-size="9" fill="#4a5568" text-anchor="middle">UV INDEX</text>
  <text x="460" y="280" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">3 Moderate</text>
  <rect x="40" y="288" width="520" height="1" fill="#ffffff" fill-opacity=".06"/>
  <text x="130" y="308" font-size="9" fill="#4a5568" text-anchor="middle">PRESSURE</text>
  <text x="130" y="324" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">1013 hPa</text>
  <line x1="220" y1="291" x2="220" y2="330" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="300" y="308" font-size="9" fill="#4a5568" text-anchor="middle">SUNRISE</text>
  <text x="300" y="324" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">5:48 AM</text>
  <line x1="380" y1="291" x2="380" y2="330" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="460" y="308" font-size="9" fill="#4a5568" text-anchor="middle">SUNSET</text>
  <text x="460" y="324" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">6:12 PM</text>
  <!-- Forecast -->
  <rect x="40" y="330" width="520" height="1" fill="#ffffff" fill-opacity=".06"/>
  <text x="68" y="352" font-size="9" font-weight="700" fill="#d4a843" letter-spacing="1">5-DAY FORECAST</text>
  <rect x="52"  y="360" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="96"  y="375" font-size="9" fill="#8892a4" text-anchor="middle">MON</text>
  <text x="88"  y="394" font-size="18">🌤</text><text x="96" y="402" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 19°</text>
  <rect x="150" y="360" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="194" y="375" font-size="9" fill="#8892a4" text-anchor="middle">TUE</text>
  <text x="186" y="394" font-size="18">🌧</text><text x="194" y="402" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 16°</text>
  <rect x="248" y="360" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="292" y="375" font-size="9" fill="#8892a4" text-anchor="middle">WED</text>
  <text x="284" y="394" font-size="18">⛈</text><text x="292" y="402" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 15°</text>
  <rect x="346" y="360" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="390" y="375" font-size="9" fill="#8892a4" text-anchor="middle">THU</text>
  <text x="382" y="394" font-size="18">🌥</text><text x="390" y="402" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 17°</text>
  <rect x="444" y="360" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="488" y="375" font-size="9" fill="#8892a4" text-anchor="middle">FRI</text>
  <text x="480" y="394" font-size="18">☀️</text><text x="488" y="402" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 20°</text>
  <text x="300" y="460" font-size="10" fill="#4a5568" text-anchor="middle">* Weather data is simulated for demo purposes</text>
</svg>
