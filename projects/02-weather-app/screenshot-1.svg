  <text x="63"  y="380" font-size="16">🌤</text><text x="67" y="385" font-size="10" font-weight="700" fill="#e6edf3" text-anchor="middle"> 19°</text>
  <rect x="110" y="350" width="70" height="40" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="145" y="365" font-size="9" fill="#8892a4" text-anchor="middle">TUE</text>
  <text x="141" y="380" font-size="16">🌧</text><text x="145" y="385" font-size="10" font-weight="700" fill="#e6edf3" text-anchor="middle"> 16°</text>
  <rect x="188" y="350" width="70" height="40" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="223" y="365" font-size="9" fill="#8892a4" text-anchor="middle">WED</text>
  <text x="219" y="380" font-size="16">⛈</text><text x="223" y="385" font-size="10" font-weight="700" fill="#e6edf3" text-anchor="middle"> 15°</text>
  <rect x="266" y="350" width="70" height="40" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="301" y="365" font-size="9" fill="#8892a4" text-anchor="middle">THU</text>
  <text x="297" y="380" font-size="16">🌥</text><text x="301" y="385" font-size="10" font-weight="700" fill="#e6edf3" text-anchor="middle"> 17°</text>
  <rect x="344" y="350" width="70" height="40" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="379" y="365" font-size="9" fill="#8892a4" text-anchor="middle">FRI</text>
  <text x="375" y="380" font-size="16">☀️</text><text x="379" y="385" font-size="10" font-weight="700" fill="#e6edf3" text-anchor="middle"> 20°</text>

  <text x="240" y="512" font-size="10" fill="#4a5568" text-anchor="middle">Screenshot 1 — Baguio City default view</text>
