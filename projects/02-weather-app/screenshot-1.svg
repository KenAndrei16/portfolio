<svg viewBox="0 0 480 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="480" height="520" fill="#0d1117"/>
  <!-- Search -->
  <rect x="20" y="16" width="440" height="36" rx="10" fill="#161b22" stroke="#d4a843" stroke-width="1" stroke-opacity="0.2"/>
