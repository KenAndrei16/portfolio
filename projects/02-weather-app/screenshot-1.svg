  <text x="46" y="144" font-size="12" fill="#8892a4">Philippines 🇵🇭</text>
  <text x="46" y="160" font-size="11" fill="#4a5568">10:42:33 AM</text>
  <!-- Weather icon -->
  <text x="400" y="152" font-size="52" text-anchor="middle">⛅</text>
  <text x="400" y="172" font-size="11" fill="#8892a4" text-anchor="middle">Partly Cloudy</text>

