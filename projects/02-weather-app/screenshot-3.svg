  <text x="68" y="298" font-size="9" font-weight="700" fill="#d4a843" letter-spacing="1">5-DAY FORECAST</text>
  <rect x="52"  y="306" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
