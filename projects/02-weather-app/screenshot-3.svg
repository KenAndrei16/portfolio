  <text x="88"  y="340" font-size="18">☀️</text><text x="96" y="348" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 33°</text>
  <rect x="150" y="306" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="194" y="321" font-size="9" fill="#8892a4" text-anchor="middle">TUE</text>
  <text x="186" y="340" font-size="18">⛅</text><text x="194" y="348" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 31°</text>
  <rect x="248" y="306" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="292" y="321" font-size="9" fill="#8892a4" text-anchor="middle">WED</text>
  <text x="284" y="340" font-size="18">🌦</text><text x="292" y="348" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 30°</text>
  <rect x="346" y="306" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="390" y="321" font-size="9" fill="#8892a4" text-anchor="middle">THU</text>
  <text x="382" y="340" font-size="18">🌧</text><text x="390" y="348" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 28°</text>
  <rect x="444" y="306" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="488" y="321" font-size="9" fill="#8892a4" text-anchor="middle">FRI</text>
  <text x="480" y="340" font-size="18">⛅</text><text x="488" y="348" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 31°</text>
</svg>
