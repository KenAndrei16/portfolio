  <text x="130" y="270" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">85%</text>
  <line x1="220" y1="237" x2="220" y2="276" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="300" y="254" font-size="9" fill="#4a5568" text-anchor="middle">WIND</text>
  <text x="300" y="270" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">18 km/h</text>
  <line x1="380" y1="237" x2="380" y2="276" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="460" y="254" font-size="9" fill="#4a5568" text-anchor="middle">PRESSURE</text>
  <text x="460" y="270" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">1008 hPa</text>
