  <!-- Manila chip highlighted -->
  <rect x="108" y="60" width="52" height="20" rx="10" fill="#d4a843" fill-opacity=".22" stroke="#d4a843" stroke-opacity=".5" stroke-width="1"/>
  <text x="134" y="74" font-size="10" fill="#d4a843" text-anchor="middle">Manila</text>
  <!-- Hot sunny card -->
  <rect x="40" y="88" width="520" height="328" rx="18" fill="#1a1a0e" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="68" y="126" font-size="22" font-weight="700" fill="#e6edf3">Manila</text>
  <text x="68" y="146" font-size="13" fill="#8892a4">Philippines 🇵🇭  ·  02:05 PM</text>
  <text x="520" y="140" font-size="58" text-anchor="middle">☀️</text>
  <text x="520" y="162" font-size="11" fill="#8892a4" text-anchor="middle">Hot and Humid</text>
  <!-- High temp -->
  <text x="68" y="216" font-size="76" font-weight="900" fill="#d4a843" letter-spacing="-2">32</text>
