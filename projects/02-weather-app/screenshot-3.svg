<svg viewBox="0 0 600 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',sans-serif" preserveAspectRatio="xMidYMid meet">
  <rect width="600" height="440" fill="#0d1117"/>
  <rect x="40" y="16" width="520" height="36" rx="10" fill="#161b22" stroke="#d4a843" stroke-opacity=".2" stroke-width="1"/>
  <text x="78" y="38" font-size="12" fill="#4a5568">Search city...</text>
  <rect x="462" y="22" width="88" height="24" rx="7" fill="#d4a843"/>
