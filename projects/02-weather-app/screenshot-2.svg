<svg viewBox="0 0 600 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',sans-serif" preserveAspectRatio="xMidYMid meet">
  <rect width="600" height="460" fill="#0d1117"/>
  <!-- Search with Tokyo -->
  <rect x="40" y="16" width="520" height="36" rx="10" fill="#161b22" stroke="#d4a843" stroke-width="1.5"/>
  <text x="78" y="38" font-size="12" fill="#e6edf3">Tokyo|</text>
  <rect x="462" y="22" width="88" height="24" rx="7" fill="#d4a843"/>
  <text x="506" y="38" font-size="12" font-weight="700" fill="#0a0f1e" text-anchor="middle">Search</text>
  <!-- Tokyo chip highlighted -->
  <rect x="276" y="60" width="44" height="20" rx="10" fill="#d4a843" fill-opacity=".22" stroke="#d4a843" stroke-opacity=".5" stroke-width="1"/>
  <text x="298" y="74" font-size="10" fill="#d4a843" text-anchor="middle">Tokyo</text>
  <!-- Main card - sunny tint -->
  <rect x="40" y="88" width="520" height="348" rx="18" fill="#1a2010" stroke="#d4a843" stroke-opacity=".18" stroke-width="1"/>
  <text x="68" y="128" font-size="22" font-weight="700" fill="#e6edf3">Tokyo</text>
  <text x="68" y="148" font-size="13" fill="#8892a4">Japan 🇯🇵  ·  02:42 PM</text>
  <text x="520" y="144" font-size="58" text-anchor="middle">☀️</text>
  <text x="520" y="166" font-size="11" fill="#8892a4" text-anchor="middle">Clear Sky</text>
  <!-- Fahrenheit active -->
  <text x="68" y="222" font-size="76" font-weight="900" fill="#d4a843" letter-spacing="-2">71</text>
  <rect x="152" y="182" width="30" height="22" rx="5" fill="none" stroke="#d4a843" stroke-opacity=".25" stroke-width="1"/>
  <text x="167" y="197" font-size="12" fill="#8892a4" text-anchor="middle">°C</text>
  <rect x="152" y="208" width="30" height="22" rx="5" fill="#d4a843" fill-opacity=".18" stroke="#d4a843" stroke-width="1"/>
  <text x="167" y="223" font-size="12" font-weight="700" fill="#d4a843" text-anchor="middle">°F</text>
  <!-- Details -->
  <rect x="40" y="240" width="520" height="1" fill="#ffffff" fill-opacity=".06"/>
  <text x="130" y="260" font-size="9" fill="#4a5568" text-anchor="middle">HUMIDITY</text>
  <text x="130" y="276" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">60%</text>
  <line x1="220" y1="243" x2="220" y2="282" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="300" y="260" font-size="9" fill="#4a5568" text-anchor="middle">WIND</text>
  <text x="300" y="276" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">20 km/h</text>
  <line x1="380" y1="243" x2="380" y2="282" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="460" y="260" font-size="9" fill="#4a5568" text-anchor="middle">UV INDEX</text>
  <text x="460" y="276" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">4 Moderate</text>
  <!-- Forecast in Fahrenheit -->
  <rect x="40" y="284" width="520" height="1" fill="#ffffff" fill-opacity=".06"/>
  <text x="68" y="304" font-size="9" font-weight="700" fill="#d4a843" letter-spacing="1">5-DAY FORECAST (°F)</text>
  <rect x="52"  y="312" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="96"  y="327" font-size="9" fill="#8892a4" text-anchor="middle">MON</text>
  <text x="88"  y="346" font-size="18">☀️</text><text x="96" y="354" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 73°</text>
  <rect x="150" y="312" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="194" y="327" font-size="9" fill="#8892a4" text-anchor="middle">TUE</text>
  <text x="186" y="346" font-size="18">🌤</text><text x="194" y="354" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 72°</text>
  <rect x="248" y="312" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="292" y="327" font-size="9" fill="#8892a4" text-anchor="middle">WED</text>
  <text x="284" y="346" font-size="18">⛅</text><text x="292" y="354" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 68°</text>
  <rect x="346" y="312" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="390" y="327" font-size="9" fill="#8892a4" text-anchor="middle">THU</text>
  <text x="382" y="346" font-size="18">🌧</text><text x="390" y="354" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 64°</text>
  <rect x="444" y="312" width="88" height="48" rx="9" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
  <text x="488" y="327" font-size="9" fill="#8892a4" text-anchor="middle">FRI</text>
  <text x="480" y="346" font-size="18">🌤</text><text x="488" y="354" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle"> 70°</text>
</svg>
