<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,2 19.9,12.3 31,12.3 22,18.7 25.4,29 16,22.7 6.6,29 10,18.7 1,12.3 12.1,12.3' fill='%23d4a843'/%3E%3C/svg%3E" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List — Ken Andrei</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .back-btn {
      position: fixed; top: 1rem; left: 1rem; z-index: 999;
      display: inline-flex; align-items: center; gap: .5rem;
      background: rgba(10,15,30,.85); color: #d4a843;
      border: 1px solid rgba(212,168,67,.35); border-radius: 9px;
      padding: .55rem 1rem; font-size: .82rem; font-weight: 600;
      text-decoration: none; backdrop-filter: blur(12px);
      font-family: 'Segoe UI', sans-serif;
      transition: background .2s, border-color .2s, transform .2s;
    }
    .back-btn:hover { background: rgba(212,168,67,.15); border-color: #d4a843; transform: translateX(-2px); }
    .back-btn svg { flex-shrink: 0; }
  </style>
</head>
<body>

  <!-- Back to Portfolio button -->
  <a href="../../index.html" class="back-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    ★ Back to Portfolio
  </a>

  <div class="app-wrapper">

    <!-- ── APP HEADER ── -->
    <header class="app-header">
      <h1 class="app-title">My Tasks</h1>
      <p class="app-subtitle" id="dateDisplay"></p>
    </header>

    <!-- ── STATS BAR ── -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-num" id="totalCount">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="doneCount">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="pendingCount">0</span>
        <span class="stat-label">Pending</span>
      </div>
    </div>

    <!-- ── ADD TASK FORM ── -->
    <div class="add-task-form">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="Add a new task..."
        maxlength="100"
        autocomplete="off"
      />
      <select id="prioritySelect" class="priority-select">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button id="addBtn" class="btn-add" onclick="addTask()">Add</button>
    </div>

    <!-- ── FILTER TABS ── -->
    <div class="filter-tabs">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>

    <!-- ── PRIORITY FILTER ── -->
    <div class="priority-tabs">
      <span class="priority-tab-label">Priority:</span>
      <button class="priority-filter-btn active" onclick="setPriorityFilter('all', this)">All</button>
      <button class="priority-filter-btn" onclick="setPriorityFilter('high', this)">
        <span class="pdot high"></span>High
      </button>
      <button class="priority-filter-btn" onclick="setPriorityFilter('medium', this)">
        <span class="pdot medium"></span>Medium
      </button>
      <button class="priority-filter-btn" onclick="setPriorityFilter('low', this)">
        <span class="pdot low"></span>Low
      </button>
    </div>

    <!-- ── TASK LIST ── -->
    <ul class="task-list" id="taskList"></ul>

    <!-- ── EMPTY STATE ── -->
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      <p>No tasks here. Add one above!</p>
    </div>

    <!-- ── CLEAR COMPLETED ── -->
    <div class="bottom-bar">
      <button class="btn-clear" onclick="clearCompleted()">Clear Completed</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
