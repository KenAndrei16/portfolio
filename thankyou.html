<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>★ Message Sent — Ken Andrei A. Batac</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,2 19.9,12.3 31,12.3 22,18.7 25.4,29 16,22.7 6.6,29 10,18.7 1,12.3 12.1,12.3' fill='%23d4a843'/%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ── Reuse the same CSS variables as the main portfolio ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-theme="dark"] {
      --bg:    #0a0f1e;
      --card:  #161b22;
      --gold:  #d4a843;
      --gold2: #f0c060;
      --white: #f5f7ff;
      --muted: #8892a4;
      --border: rgba(212,168,67,.18);
    }
    [data-theme="light"] {
      --bg:    #f4f6fb;
      --card:  #ffffff;
      --gold:  #b8861e;
      --gold2: #d4a843;
      --white: #0a0f1e;
      --muted: #5a6580;
      --border: rgba(180,140,40,.22);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Subtle background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,168,67,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,168,67,.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(212,168,67,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3.5rem 3rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88) translateY(20px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    /* ── Check icon ── */
    .check-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(63, 185, 80, 0.12);
      border: 2px solid rgba(63, 185, 80, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
      animation: checkPop 0.5s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes checkPop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .check-wrap svg {
      animation: checkDraw 0.4s 0.6s ease both;
    }
    @keyframes checkDraw {
      from { stroke-dashoffset: 30; opacity: 0; }
      to   { stroke-dashoffset: 0;  opacity: 1; }
    }

    /* ── Text ── */
    .thank-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      animation: fadeUp 0.5s 0.4s ease both;
    }
    .thank-title span { color: var(--gold); font-style: italic; }

    .thank-msg {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 2rem;
      animation: fadeUp 0.5s 0.5s ease both;
    }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      border-radius: 2px;
      margin: 0 auto 2rem;
      animation: fadeUp 0.5s 0.55s ease both;
    }

    /* ── Back button ── */
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--gold);
      color: #0a0f1e;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.85rem 2rem;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.5s 0.6s ease both;
    }
    .btn-back:hover {
      background: var(--gold2);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(212,168,67,.28);
    }

    /* ── Star logo at bottom ── */
    .card-footer {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      animation: fadeUp 0.5s 0.7s ease both;
    }
    .card-footer svg { flex-shrink: 0; }

    /* ── Countdown text ── */
    .countdown {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 1rem;
      animation: fadeUp 0.5s 0.65s ease both;
    }
    .countdown span { color: var(--gold); font-weight: 600; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 2.5rem 1.5rem; }
      .thank-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Green check circle -->
    <div class="check-wrap">
      <svg width="32" height="32" fill="none" stroke="#3fb950" stroke-width="2.5"
           stroke-dasharray="30" stroke-linecap="round" viewBox="0 0 24 24">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>

    <h1 class="thank-title">Message <em>Sent!</em></h1>

    <p class="thank-msg">
      Thanks for reaching out! I received your message and will
      get back to you as soon as possible — usually within 24 hours.
    </p>

    <div class="divider"></div>

    <a href="index.html" class="btn-back">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back to Portfolio
    </a>

    <!-- Auto-redirect countdown -->
    <p class="countdown">
      Redirecting automatically in <span id="countNum">8</span> seconds…
    </p>

    <!-- Star branding footer -->
    <div class="card-footer">
      <svg width="14" height="14" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <polygon points="16,2 19.9,12.3 31,12.3 22,18.7 25.4,29 16,22.7 6.6,29 10,18.7 1,12.3 12.1,12.3" fill="#d4a843"/>
      </svg>
      Ken Andrei A. Batac — Saint Louis University
    </div>

  </div>

  <script>
    // Apply saved theme so it matches the main portfolio
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);

    // Countdown then redirect back to portfolio
    let count = 8;
    const countEl = document.getElementById('countNum');

    const timer = setInterval(() => {
      count--;
      if (countEl) countEl.textContent = count;
      if (count <= 0) {
        clearInterval(timer);
        window.location.href = 'index.html';
      }
    }, 1000);
  </script>

</body>
</html>
